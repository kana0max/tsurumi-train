<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鶴見駅 次の電車</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .day-type {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.8;
        }

        .direction-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        .direction {
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            color: white;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
        }

        .direction.tokyo {
            background: linear-gradient(135deg, #0084ff 0%, #0063cc 100%);
        }

        .direction.yokohama {
            background: linear-gradient(135deg, #00c44f 0%, #009844 100%);
        }

        .direction-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .train-time {
            font-size: 60px;
            font-weight: bold;
            line-height: 1;
            margin-bottom: 10px;
            font-variant-numeric: tabular-nums;
        }

        .train-time-unit {
            font-size: 24px;
            margin-left: 5px;
            opacity: 0.8;
        }

        .next-train-time {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 10px;
        }

        .footer {
            background: #f5f5f5;
            padding: 15px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
        }

        .footer p {
            font-size: 12px;
            color: #666;
        }

        .update-time {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        .status-message {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
            min-height: 20px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 24px;
            }

            .train-time {
                font-size: 50px;
            }

            .direction {
                min-height: 160px;
                padding: 15px;
            }
        }

        @media (prefers-reduced-motion: no-preference) {
            .train-time {
                animation: pulse 2s infinite;
            }

            @keyframes pulse {
                0%, 100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.8;
                }
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚆 鶴見駅</h1>
            <p>京浜東北線 次の電車</p>
            <div class="day-type" id="day-type">--</div>
        </div>

        <div class="direction-container">
            <!-- 東京方面 -->
            <div class="direction tokyo">
                <div class="direction-name">↑ 東京・大宮方面</div>
                <div>
                    <div class="train-time">
                        <span id="tokyo-min">--</span>
                        <span class="train-time-unit">分</span>
                        <span id="tokyo-sec">--</span>
                        <span class="train-time-unit">秒</span>
                    </div>
                    <div class="next-train-time">次発: <span id="tokyo-time">--:--</span></div>
                    <div class="status-message" id="tokyo-status"></div>
                </div>
            </div>

            <!-- 横浜方面 -->
            <div class="direction yokohama">
                <div class="direction-name">↓ 横浜・大船方面</div>
                <div>
                    <div class="train-time">
                        <span id="yokohama-min">--</span>
                        <span class="train-time-unit">分</span>
                        <span id="yokohama-sec">--</span>
                        <span class="train-time-unit">秒</span>
                    </div>
                    <div class="next-train-time">次発: <span id="yokohama-time">--:--</span></div>
                    <div class="status-message" id="yokohama-status"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>⏰ <span id="current-time">--:--:--</span></p>
            <p class="update-time">更新: <span id="update-time">--:--:--</span></p>
        </div>
    </div>

    <script>
        // 鶴見駅 京浜東北線 時刻表（平日・休日）
        const trainSchedules = {
            // 平日データ
            weekday: {
                tokyo: [ // 東京・大宮方面（上り）
                    [3, 11, 22, 29, 35, 41, 49, 52, 57], // 6時
                    [1, 7, 12, 16, 18, 23, 26, 31, 34, 36, 40, 43, 46, 49, 52, 55, 59], // 7時
                    [2, 6, 8, 12, 15, 18, 21, 25, 27, 31, 35, 38, 41, 44, 47, 50, 56, 59], // 8時
                    [2, 7, 10, 15, 18, 23, 27, 32, 36, 42, 47, 51, 55], // 9時
                    [1, 7, 12, 17, 26, 32, 37, 47, 52], // 10時
                    [2, 7, 12, 22, 28, 32, 42, 47, 52], // 11時
                    [2, 7, 12, 22, 28, 32, 42, 48, 52], // 12時
                    [2, 8, 12, 22, 28, 32, 42, 48, 52], // 13時
                    [2, 8, 12, 22, 28, 32, 42, 48, 52], // 14時
                    [3, 8, 13, 22, 28, 32, 42, 48, 53], // 15時
                    [3, 8, 12, 18, 22, 26, 32, 41, 48, 52, 57], // 16時
                    [2, 8, 13, 18, 22, 24, 31, 37, 44, 47, 52, 58], // 17時
                    [5, 8, 11, 17, 22, 25, 28, 31, 33, 37, 41, 45, 49, 53, 59], // 18時
                    [2, 8, 13, 17, 22, 26, 30, 35, 41, 47, 53, 56], // 19時
                    [2, 7, 12, 18, 24, 27, 32, 37, 42, 47, 53, 58], // 20時
                    [5, 13, 18, 23, 28, 32, 38, 43, 47, 52, 57], // 21時
                    [2, 9, 13, 23, 27, 33, 42, 46, 53, 58], // 22時
                    [3, 9, 16, 22, 28, 32, 40, 51] // 23時
                ],
                yokohama: [ // 横浜・大船方面（下り）
                    [5, 9, 14, 19, 23, 29, 36, 42, 45, 51, 56], // 6時
                    [1, 9, 14, 17, 21, 26, 30, 36, 40, 44, 49, 54], // 7時
                    [0, 7, 14, 20, 23, 26, 30, 37, 41, 47, 50, 58], // 8時
                    [4, 8, 12, 16, 20, 24, 29, 36, 42, 45, 52, 57], // 9時
                    [4, 10, 15, 18, 25, 29, 34, 38, 45, 54, 59], // 10時
                    [5, 15, 24, 29, 35, 44, 49, 55], // 11時
                    [4, 9, 15, 24, 29, 34, 35, 44, 49, 55], // 12時
                    [4, 9, 15, 24, 29, 35, 45, 49, 55], // 13時
                    [4, 9, 15, 24, 29, 35, 45, 49, 55], // 14時
                    [4, 9, 14, 19, 25, 34, 39, 45, 54, 59], // 15時
                    [7, 15, 20, 26, 36, 39, 44, 50, 56], // 16時
                    [5, 10, 14, 19, 24, 29, 34, 39, 44, 49, 55], // 17時
                    [0, 5, 7, 12, 16, 19, 22, 26, 30, 33, 40, 46, 50, 55], // 18時
                    [2, 8, 12, 17, 21, 25, 32, 36, 42, 49, 53, 59], // 19時
                    [3, 7, 13, 18, 22, 29, 34, 42, 46, 50, 55], // 20時
                    [0, 5, 10, 15, 20, 25, 30, 35, 40, 46, 51, 56], // 21時
                    [1, 6, 12, 18, 23, 29, 34, 40, 47, 53, 58], // 22時
                    [4, 11, 17, 24, 29, 35, 41, 47, 53, 59] // 23時
                ]
            },
            // 休日データ
            holiday: {
                tokyo: [ // 東京・大宮方面（上り）
                    [3, 12, 22, 27, 33, 38, 48, 53], // 6時
                    [0, 6, 12, 17, 22, 27, 32, 37, 43, 48, 53, 58], // 7時
                    [3, 8, 13, 18, 23, 28, 33, 38, 43, 48, 52, 58], // 8時
                    [3, 8, 13, 18, 23, 27, 31, 38, 44, 49, 54], // 9時
                    [1, 7, 12, 22, 27, 32, 42, 48, 52], // 10時
                    [3, 8, 12, 23, 28, 32, 43, 48, 52], // 11時
                    [2, 7, 12, 22, 28, 32, 42, 47, 52], // 12時
                    [2, 7, 12, 22, 28, 32, 42, 48, 52], // 13時
                    [2, 8, 12, 22, 28, 32, 42, 48, 51, 58], // 14時
                    [2, 8, 11, 22, 27, 31, 40, 47, 51, 57], // 15時
                    [2, 7, 17, 22, 27, 31, 37, 47, 51, 56], // 16時
                    [0, 5, 12, 16, 21, 31, 36, 41, 45, 52, 58], // 17時
                    [2, 7, 11, 16, 21, 26, 32, 37, 42, 47, 52, 57], // 18時
                    [2, 7, 11, 18, 22, 27, 32, 37, 43, 47, 52, 57], // 19時
                    [3, 7, 12, 16, 22, 28, 34, 39, 45, 52, 58], // 20時
                    [3, 9, 16, 23, 29, 36, 43, 50, 58], // 21時
                    [5, 12, 18, 24, 32, 40, 46, 54], // 22時
                    [2, 10, 16, 22, 28, 40, 51] // 23時
                ],
                yokohama: [ // 横浜・大船方面（下り）
                    [8, 19, 27, 36, 41, 49, 57], // 6時
                    [6, 12, 19, 24, 31, 36, 41, 46, 52], // 7時
                    [0, 9, 14, 19, 24, 33, 42, 46, 54, 59], // 8時
                    [6, 14, 19, 24, 29, 34, 45, 49, 54, 59], // 9時
                    [4, 9, 14, 24, 29, 34, 44, 49, 54, 59], // 10時
                    [5, 14, 24, 29, 34, 44, 49, 54], // 11時
                    [4, 9, 14, 24, 29, 34, 44, 49, 54], // 12時
                    [4, 9, 14, 24, 29, 34, 44, 49, 54], // 13時
                    [4, 9, 14, 24, 28, 34, 44, 49, 54, 59], // 14時
                    [4, 14, 19, 24, 29, 34, 44, 49, 54, 59], // 15時
                    [5, 12, 17, 25, 30, 35, 39, 45, 54, 59], // 16時
                    [5, 9, 14, 19, 25, 34, 39, 44, 49, 59], // 17時
                    [4, 9, 14, 19, 29, 35, 44, 49, 54], // 18時
                    [0, 4, 9, 14, 19, 24, 29, 34, 39, 44, 50, 54, 59], // 19時
                    [5, 9, 14, 19, 24, 29, 34, 42, 45, 49, 57], // 20時
                    [3, 8, 13, 19, 25, 31, 37, 43, 49, 55], // 21時
                    [1, 7, 14, 20, 25, 31, 37, 43, 49, 55], // 22時
                    [3, 9, 16, 23, 29, 37, 44, 53, 59] // 23時
                ]
            }
        };

        // 平日・休日を判定する関数
        function isHoliday() {
            const now = new Date();
            const dayOfWeek = now.getDay();

            // 土曜日（6）と日曜日（0）を休日と判定
            if (dayOfWeek === 0 || dayOfWeek === 6) {
                return true;
            }

            // TODO: 祝日データを追加する場合はここに記述
            return false;
        }

        // 次の電車を探す関数
        function getNextTrain(direction) {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMin = now.getMinutes();
            const isHol = isHoliday();
            const schedule = isHol ? trainSchedules.holiday : trainSchedules.weekday;
            const times = schedule[direction];

            // 6時～23時の範囲内か確認
            if (currentHour < 6 || currentHour > 23) {
                return { hour: null, min: null, isNextDay: true };
            }

            // 現在時刻より後の電車を探す
            for (let h = currentHour; h <= 23; h++) {
                const hourIndex = h - 6;
                if (hourIndex < 0 || hourIndex >= times.length) continue;

                const timesInHour = times[hourIndex];
                for (const minValue of timesInHour) {
                    if (h > currentHour || (h === currentHour && minValue > currentMin)) {
                        return { hour: h, min: minValue, isNextDay: false };
                    }
                }
            }

            // 当日に次の電車がない場合は、翌日6時の電車
            return { hour: 6, min: times[0][0], isNextDay: true };
        }

        // 時間差を計算する関数
        function getTimeUntil(nextTrain) {
            const now = new Date();
            let nextTime = new Date();

            if (nextTrain.isNextDay) {
                nextTime = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, nextTrain.hour, nextTrain.min, 0);
            } else {
                nextTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), nextTrain.hour, nextTrain.min, 0);
            }

            const diffMs = nextTime - now;
            const diffSec = Math.floor(diffMs / 1000);

            if (diffSec < 0) {
                return { min: 0, sec: 0 };
            }

            const min = Math.floor(diffSec / 60);
            const sec = diffSec % 60;

            return { min, sec };
        }

        // UI更新関数
        function updateDisplay() {
            const now = new Date();
            const isHol = isHoliday();

            // 現在時刻表示
            const timeString = now.toLocaleTimeString('ja-JP', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('current-time').textContent = timeString;

            // 平日・休日表示
            const dayName = ['日', '月', '火', '水', '木', '金', '土'][now.getDay()];
            const dayTypeText = isHol ? `${dayName}曜日（休日）` : `${dayName}曜日（平日）`;
            document.getElementById('day-type').textContent = dayTypeText;

            // 東京方面
            const tokyoNext = getNextTrain('tokyo');
            const tokyoTime = getTimeUntil(tokyoNext);
            document.getElementById('tokyo-min').textContent = String(tokyoTime.min).padStart(2, '0');
            document.getElementById('tokyo-sec').textContent = String(tokyoTime.sec).padStart(2, '0');

            if (tokyoNext.hour !== null) {
                const timeStr = String(tokyoNext.hour).padStart(2, '0') + ':' + String(tokyoNext.min).padStart(2, '0');
                document.getElementById('tokyo-time').textContent = timeStr;
                document.getElementById('tokyo-status').textContent = tokyoNext.isNextDay ? '（翌日）' : '';
            } else {
                document.getElementById('tokyo-time').textContent = '運行終了';
                document.getElementById('tokyo-status').textContent = '翌日6:03まで';
            }

            // 横浜方面
            const yokohamaNext = getNextTrain('yokohama');
            const yokohamaTime = getTimeUntil(yokohamaNext);
            document.getElementById('yokohama-min').textContent = String(yokohamaTime.min).padStart(2, '0');
            document.getElementById('yokohama-sec').textContent = String(yokohamaTime.sec).padStart(2, '0');

            if (yokohamaNext.hour !== null) {
                const timeStr = String(yokohamaNext.hour).padStart(2, '0') + ':' + String(yokohamaNext.min).padStart(2, '0');
                document.getElementById('yokohama-time').textContent = timeStr;
                document.getElementById('yokohama-status').textContent = yokohamaNext.isNextDay ? '（翌日）' : '';
            } else {
                document.getElementById('yokohama-time').textContent = '運行終了';
                document.getElementById('yokohama-status').textContent = '翌日6:08まで';
            }

            // 更新時刻
            document.getElementById('update-time').textContent = timeString;
        }

        // 初期表示
        updateDisplay();

        // 毎秒更新
        setInterval(updateDisplay, 1000);
    </script>
</body>
</html>
